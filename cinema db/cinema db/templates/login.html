{% extends "base.html" %}
{% block title %}Login &mdash; CinemaDB{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">CinemaDB</div>
    <p class="auth-tagline">Intelligent Movie Streaming &amp; Recommendation</p>
    <h2 class="auth-head">Welcome back</h2>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required/>
      </div>
      <button class="btn-submit" type="submit">Sign In</button>
    </form>
    <div class="auth-sep">or</div>
    <div class="auth-link">No account? <a href="{{ url_for('signup') }}">Create one free</a></div>
    <div class="auth-link" style="margin-top:.5rem;"><a href="{{ url_for('home') }}" style="color:var(--dim);">Back to Home</a></div>
  </div>
</div>
{% endblock %}
