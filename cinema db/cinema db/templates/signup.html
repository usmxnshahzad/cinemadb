{% extends "base.html" %}
{% block title %}Sign Up &mdash; CinemaDB{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">CinemaDB</div>
    <p class="auth-tagline">Join millions of film lovers</p>
    <h2 class="auth-head">Create your account</h2>
    {% if error %}<div class="alert-error">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username" placeholder="e.g. filmfanatic" required autofocus/>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" name="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="At least 6 characters" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" type="password" name="confirm" placeholder="Repeat password" required/>
      </div>
      <button class="btn-submit" type="submit">Create Account</button>
    </form>
    <div class="auth-link" style="margin-top:1.2rem;">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></div>
  </div>
</div>
{% endblock %}
